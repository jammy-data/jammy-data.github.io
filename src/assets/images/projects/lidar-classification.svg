<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Automated LiDAR classification thumbnail</title>
  <desc id="desc">Abstract city blocks with segmented color overlays representing classified LiDAR points.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8eee0" />
      <stop offset="100%" stop-color="#b8ddd0" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <g opacity="0.9">
    <rect x="120" y="140" width="520" height="250" rx="20" fill="#285b47" />
    <rect x="680" y="220" width="400" height="200" rx="20" fill="#417864" />
    <rect x="1090" y="130" width="390" height="330" rx="20" fill="#5f9a84" />
    <rect x="220" y="440" width="760" height="290" rx="20" fill="#2f6b55" />
    <rect x="1020" y="500" width="420" height="250" rx="20" fill="#7db9a0" />
  </g>
  <g opacity="0.72">
    <circle cx="380" cy="260" r="90" fill="#b6ff6c" />
    <circle cx="890" cy="305" r="66" fill="#9ef760" />
    <circle cx="1260" cy="266" r="84" fill="#d6ff8e" />
    <circle cx="620" cy="585" r="76" fill="#ccff84" />
    <circle cx="1160" cy="620" r="92" fill="#b9ff71" />
  </g>
  <text x="120" y="840" font-size="92" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="700" fill="#103022">LiDAR Classification</text>
</svg>
