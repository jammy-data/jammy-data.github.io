<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - James Murphy</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <header class="masthead">
        <nav class="nav-container">
            <a href="/" class="logo">James Murphy</a>
            <ul class="nav-menu">
                <li><a href="/" {% if page.url == "/" %}class="active"{% endif %}>Home</a></li>
                <li><a href="/about/" {% if page.url == "/about/" %}class="active"{% endif %}>About</a></li>
                <li><a href="/projects/" {% if page.url == "/projects/" %}class="active"{% endif %}>Projects</a></li>
            </ul>
        </nav>
    </header>

    <main class="content">
        {{ content | safe }}
    </main>

    <footer class="footer">
        <p>&copy; 2024 James Murphy. Built with Eleventy & Vanilla JS.</p>
    </footer>

    <script src="/assets/js/animations.js"></script>
</body>
</html>
